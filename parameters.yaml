---
# This file contains the parameters for the training and testing of the model.

# WandB parameters, can be ignored if not using WandB
wandb_training_project: "sa-net"
wandb_training_name: "swellex-run-newbeta-1"
run_with_wandb: false

# Training parameters
batch_size: 32
sample_duration: 1.0
data_format_mode: "time_series" # (Accepted: "time_series", "chunked_list")
audio_channels: 21
learning_rate: 1e-4
num_epochs: 100
device: "cuda" # (Accepted: "cuda", "cpu")
optimizer: "Adam"
sampling_rate: 1500
list_of_chunks_mode: false

# Multiple datasets - experiment, when used, provide the dataset paths below
multiple_datasets_mode: false 
train_datasets: []
validation_datasets: []
test_datasets: []

# The following parameters are for the single dataset path mode
# if cross_validation_mode = true, provide the total_folds, train_folds, validation_folds, and test_folds
# if cross_validation_mode = false, provide the test_size
# use either mode only, not both, when one mode is used, the other parameter is ignored
cross_validation_mode: true
total_folds: 6
train_folds: [0, 1, 2, 3]
validation_folds: [4]
test_folds: [5]
test_size: 0.7
run_inference_mode: true
finetune_mode: false # If finetune = true, pretrained_model_path must be provided
log_verbose: false
print_first_10th_predictions: false
prediction_output_image_plot: "true_vs_predicted_labelsS5-newbeta-1.png"
csv_file_path: "underwater-ssl/data/s59/vla/vla_raw_s59.csv"
sproul_text_file_path: "underwater-ssl/data/s59/vla/SproulToVLA.S59.txt"
best_model_path: "best_model-scratch-s5-leftright-betanew-trainone-test1.pth"
parallel_mode: false
pretrained_model_path: "/mnt/active_storage/qv/net/model_checkpoints/best_model-scratch-s5.pth"
dataset_path: "/mnt/active_storage/qv/swellex-6folds-real.pkl"
save_dir: "/mnt/active_storage/qv/net/model_checkpoints"
